<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}❄️ My Portfolio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='image/favicon.png') }}">
</head>
<body>
    <div class="loader-wrapper">
        <div class="loader-content">
            <div class="loader-snowflake-container">
                <i class="fas fa-snowflake frost-snowflake"></i>
            </div>
            <div class="blizzard-lines">
                <span class="bl-1"></span>
                <span class="bl-2"></span>
                <span class="bl-3"></span>
            </div>
            <p class="loader-text">CONJURING GLACIAL FORTRESS...</p>
        </div>
    </div>
    <div id="ice-rain-container" class="ice-rain-container"></div>
    <header>
        <nav>
             <a href="/" class="logo"><i class="fas fa-snowflake header-snowflake"></i> IceMonster</a>
    <ul class="nav-menu" id="nav-menu">
        <li><a href="/">Home</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/#skills">Skills</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#contact">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
    </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 IceMonster</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
